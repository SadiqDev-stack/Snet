<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Optimized File Saver</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      color: white;
      font-family: sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      row-gap: 1rem;
    }

    .actions {
      width: 90%;
      display: flex;
      flex-direction: column;
      row-gap: 0.5rem;
      align-items: center;
      margin-top: 1rem;
    }

    .actions * {
      width: 100%;
      padding: 0.5rem;
      font-weight: bold;
      border: none;
      border-radius: 0.5rem;
      background: #4da6ff;
      color: white;
    }

    .actions *:active {
      background: #104e8b;
      transform: scale(0.95);
    }

    .displays {
      flex: 1;
      width: 90%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      row-gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .displays > * {
      width: 100%;
      height: 200px;
      border-radius: 0.5rem;
      background: gray;
      border: 2px solid white;
    }

    a.download {
      background: black;
      color: #4DCDFF;
      padding: 0.5rem;
      text-align: center;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="actions">
    <input type="file" accept="image/*,video/*,audio/*,application/*" multiple class="file" />
    <button class="save">Save Files</button>
    <button class="clear">Clear All</button>
  </div>

  <div class="displays"></div>

  <script src="dexie.js"></script>
  <script>
    const db = new Dexie("snet");
    db.version(1).stores({
      files: "_id,createdAt,type,name"
    });

    const fileInput = document.querySelector(".file");
    const saveBtn = document.querySelector(".save");
    const clearBtn = document.querySelector(".clear");
    const displays = document.querySelector(".displays");

    let files = [];

    fileInput.onchange = () => {
      files = Array.from(fileInput.files);
    };

    async function saveFiles() {
      if (!files.length) return;
      saveBtn.textContent = "Saving...";
      for (const file of files) {
        const blob = new Blob([file], { type: file.type });
        const fileData = {
          _id: Date.now() + Math.random(),
          createdAt: Date.now(),
          type: file.type,
          name: file.name,
          data: blob
        };
        await db.files.add(fileData);
        previewMedia(fileData);
      }
      fileInput.value = "";
      files = [];
      saveBtn.textContent = "Save Files";
      console.log("Files saved.");
    }

    saveBtn.onclick = saveFiles;

    clearBtn.onclick = async () => {
      clearBtn.textContent = "Clearing...";
      await db.files.clear();
      displays.innerHTML = "";
      clearBtn.textContent = "Clear All";
      console.log("All files cleared.");
    };

    function previewMedia(fileData) {
      const url = URL.createObjectURL(fileData.data);
      const type = fileData.type;
      let el;

      if (type.startsWith("image")) {
        el = document.createElement("img");
      } else if (type.startsWith("video")) {
        el = document.createElement("video");
        el.controls = true;
      } else if (type.startsWith("audio")) {
        el = document.createElement("audio");
        el.controls = true;
      } else {
        el = document.createElement("a");
        el.href = url;
        el.download = fileData.name;
        el.className = "download";
        el.textContent = `Download: ${fileData.name}`;
      }

      if (el.tagName !== "A") {
        el.src = url;
        el.alt = fileData.name;
      }

      el.ondblclick = async () => {
        await db.files.delete(fileData._id);
        URL.revokeObjectURL(url);
        el.remove();
        console.log(`Deleted: ${fileData.name}`);
      };

      displays.prepend(el);
    }

    async function init() {
      const savedFiles = await db.files.toArray();
      savedFiles.forEach(previewMedia);
      console.log(`${savedFiles.length} files loaded.`);
    }

    init();
  </script>
</body>
</html>
